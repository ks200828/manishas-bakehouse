<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Product | Manisha's Bakehouse</title>
    <link rel="stylesheet" href="css/style.css?v=5.0">
</head>
<body>
    <header class="header-fixed">
        <a href="index.html" class="logo">Manisha's Bakehouse</a>
        <div class="nav-actions">
            <a href="shop.html">Shop Menu</a>
            <a href="cart.html">Bag (<span class="cart-badge">0</span>)</a>
        </div>
    </header>

    <main class="container pdp-layout reveal-up">
        <div class="pdp-image"><img id="p-image" src="" alt="Loading..."></div>
        <div class="pdp-details">
            <h1 id="p-name">Loading...</h1>
            <p id="p-base-price" class="title-xl">₹0</p>
            <p id="p-desc" style="color: #666; margin-bottom: 2rem;"></p>

            <form id="product-form">
                <span class="section-label">1. Base Formulation</span>
                <div id="opt-types" class="options-grid"></div>

                <div id="weight-section">
                    <span class="section-label">2. Select Weight (Pounds)</span>
                    <div id="opt-weights" class="options-grid"></div>
                </div>

                <span class="section-label">3. Artisan Add-ons</span>
                <div id="opt-addons" class="options-grid"></div>

                <div id="cake-customizations" style="display: none;">
                    <span class="section-label">4. Personalization</span>
                    <div class="form-group" style="margin-top: 1rem; margin-bottom: 1rem;">
                        <input type="text" id="cake-message" name="cake-message" placeholder=" " maxlength="40">
                        <label for="cake-message">Message on Cake (e.g. Happy Birthday)</label>
                    </div>
                    
                    <span class="section-label" style="margin-top: 1.5rem;">5. Occasion Tag</span>
                    <div id="opt-occasion" class="options-grid" style="margin-bottom: 2rem;">
                        <label class="radio-btn"><input type="radio" name="occasion" value="None" checked><span>None</span></label>
                        <label class="radio-btn"><input type="radio" name="occasion" value="Birthday"><span>Birthday</span></label>
                        <label class="radio-btn"><input type="radio" name="occasion" value="Anniversary"><span>Anniversary</span></label>
                        <label class="radio-btn"><input type="radio" name="occasion" value="Other"><span>Other</span></label>
                    </div>
                </div>

                <span class="section-label">Quantity</span>
                <div class="qty-control">
                    <button type="button" id="qty-minus">−</button>
                    <input type="number" id="qty-input" value="1" min="1" readonly>
                    <button type="button" id="qty-plus">+</button>
                </div>

                <div class="live-bill">
                    <div class="bill-row"><span>Cake + Weight Option</span><span id="bill-cake">₹0</span></div>
                    <div class="bill-row"><span>Dry Fruit Add-ons</span><span id="bill-addons">₹0</span></div>
                    <div class="bill-row total"><span>Total Estimate</span><span id="bill-total">₹0</span></div>
                </div>

                <button type="submit" class="btn">Add to Bag</button>
            </form>
        </div>
    </main>

    <script src="js/app.js?v=5.0"></script>
</body>
</html>
